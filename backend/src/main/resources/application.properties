spring.application.name=secondhand-backend
server.port=8083

spring.datasource.url=jdbc:postgresql://localhost:5432/secondhand_db
spring.datasource.username=secondhand_user
spring.datasource.password=secondhand_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# تنظیمات JWT
app.jwt.secret=SecondHandMarketSuperSecretKeyForJwtSigningPurposesOnly2024
app.jwt.expiration-ms=86400000

# آپلود تصاویر آگهی
app.upload.dir=uploads

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# داده‌های نمونه
app.seed.enabled=true
