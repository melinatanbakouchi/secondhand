version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: secondhand-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: secondhand_db
      POSTGRES_USER: secondhand_user
      POSTGRES_PASSWORD: secondhand_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secondhand_user -d secondhand_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: secondhand-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/secondhand_db
      SPRING_DATASOURCE_USERNAME: secondhand_user
      SPRING_DATASOURCE_PASSWORD: secondhand_password
    ports:
      - "8080:8080"
    volumes:
      - backend-uploads:/app/uploads

volumes:
  postgres-data:
  backend-uploads:
